{% extends 'core/base.html' %}
{% block content %}
<div class="container py-5">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/" class="text-decoration-none" style="color: #6f42c1;">Home</a></li>
        <li class="breadcrumb-item"><a href="/projects/" class="text-decoration-none" style="color: #6f42c1;">Projects</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ project.title }}</li>
      </ol>
    </nav>

    <div class="row mt-4">
        <div class="col-lg-8">
            <h1 class="display-4 fw-bold">{{ project.title }}</h1>
            <p class="badge bg-purple" style="background-color: #6f42c1;">{{ project.technologies }}</p>
            
            {% if project.image %}
            <img src="{{ project.image.url }}" class="img-fluid rounded-4 my-4 shadow" alt="{{ project.title }}">
            {% endif %}

            <div class="mt-3 fs-5">
                {{ project.description|linebreaks }}
            </div>

            <div class="mt-5 d-flex gap-3">
                <a href="#" class="btn btn-dark btn-lg">View GitHub</a>
                <a href="#" class="btn btn-purple btn-lg" style="background-color: #6f42c1; color: white;">Live Demo</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
